<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management 315301 — Study & Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f7f6f2;
            --surface: #ffffff;
            --surface2: #f1f0ec;
            --border: #e2e0d8;
            --text: #1a1916;
            --text2: #6b6860;
            --text3: #9e9c96;
            --accent: #1a1916;
            --accent-fg: #ffffff;
            --correct: #1a6b3a;
            --correct-bg: #d4f5e2;
            --incorrect-bg: #fde8e8;
            --incorrect: #991b1b;
            --progress-track: #e2e0d8;
            --progress-fill: #1a1916;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
        }

        [data-theme="dark"] {
            --bg: #0f0f0e;
            --surface: #1c1c1a;
            --surface2: #252522;
            --border: #2e2e2b;
            --text: #f0ede6;
            --text2: #8a8780;
            --text3: #5c5a55;
            --accent: #f0ede6;
            --accent-fg: #0f0f0e;
            --correct: #4ade80;
            --correct-bg: #052e16;
            --incorrect-bg: #2d0a0a;
            --incorrect: #f87171;
            --progress-track: #2e2e2b;
            --progress-fill: #f0ede6;
            --shadow: 0 2px 12px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        /* ── GLOBAL NAV BAR ────────────────────────────── */
        #topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 48px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
            transition: background 0.3s, border-color 0.3s;
        }

        #topbar-title {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text);
        }

        #topbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-btn {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .icon-btn:hover { background: var(--surface2); color: var(--text); }
        .icon-btn svg { width: 16px; height: 16px; }

        .text-btn {
            height: 34px;
            padding: 0 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text2);
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .text-btn:hover { background: var(--surface2); color: var(--text); }
        .text-btn.hidden { display: none; }

        /* ── SCREENS ───────────────────────────────────── */
        .screen {
            display: none;
            padding-top: 48px; /* offset for topbar */
            min-height: 100vh;
        }
        .screen.active { display: block; }

        /* ── START SCREEN ──────────────────────────────── */
        #start-screen {
            display: none;
            align-items: center;
            justify-content: center;
            padding-top: 48px;
            min-height: 100vh;
        }
        #start-screen.active {
            display: flex;
        }

        .start-inner {
            width: 100%;
            max-width: 480px;
            padding: 24px 16px 32px;
            text-align: center;
        }

        .logo-block {
            width: 56px;
            height: 56px;
            background: var(--accent);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .logo-block svg { width: 26px; height: 26px; color: var(--accent-fg); }

        .start-title {
            font-family: 'Syne', sans-serif;
            font-size: clamp(22px, 5vw, 30px);
            font-weight: 900;
            letter-spacing: -0.02em;
            color: var(--text);
            margin-bottom: 4px;
        }

        .start-sub {
            font-size: 13px;
            color: var(--text2);
            font-weight: 500;
            margin-bottom: 32px;
        }

        .mode-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .mode-card {
            padding: 24px 16px;
            border-radius: 16px;
            border: 2px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }
        .mode-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        .mode-card.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--accent-fg);
        }
        .mode-card.primary .mode-label { color: var(--accent-fg); }
        .mode-card.primary .mode-desc { color: rgba(255,255,255,0.55); }
        [data-theme="dark"] .mode-card.primary .mode-desc { color: rgba(0,0,0,0.45); }

        .mode-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }
        .mode-card:not(.primary) .mode-icon {
            background: var(--surface2);
        }
        .mode-icon svg { width: 18px; height: 18px; }

        .mode-label {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 800;
            color: var(--text);
            display: block;
        }
        .mode-desc {
            font-size: 12px;
            color: var(--text2);
            margin-top: 3px;
            display: block;
        }

        /* ── QUIZ SCREEN ───────────────────────────────── */
        #quiz-screen {
            padding-top: 48px;
            min-height: 100vh;
            display: none;
        }
        #quiz-screen.active { display: block; }

        .quiz-inner {
            max-width: 640px;
            margin: 0 auto;
            padding: 20px 16px 32px;
        }

        .quiz-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .q-counter {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--text3);
            font-weight: 500;
        }

        .score-chip {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--text2);
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 100px;
        }

        .progress-bar-track {
            height: 4px;
            background: var(--progress-track);
            border-radius: 2px;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--progress-fill);
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        .question-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }

        .question-num {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            font-weight: 500;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 10px;
        }

        .question-text {
            font-family: 'Syne', sans-serif;
            font-size: clamp(16px, 3.5vw, 20px);
            font-weight: 700;
            color: var(--text);
            line-height: 1.4;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.18s ease;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .option-btn:hover:not(:disabled) {
            border-color: var(--accent);
            background: var(--surface2);
            transform: translateX(3px);
        }
        .option-btn:disabled { cursor: default; }

        .option-letter {
            flex-shrink: 0;
            width: 26px;
            height: 26px;
            border-radius: 7px;
            background: var(--surface2);
            color: var(--text3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            margin-top: 1px;
        }
        .option-btn span.option-text {
            padding-top: 3px;
            line-height: 1.4;
        }

        .option-btn.correct {
            background: var(--correct-bg) !important;
            border-color: var(--correct) !important;
            color: var(--correct) !important;
        }
        .option-btn.correct .option-letter {
            background: var(--correct);
            color: #fff;
        }
        .option-btn.incorrect {
            background: var(--incorrect-bg) !important;
            border-color: var(--incorrect) !important;
            color: var(--incorrect) !important;
            opacity: 0.75;
        }
        .option-btn.incorrect .option-letter {
            background: var(--incorrect);
            color: #fff;
        }

        .next-row {
            display: flex;
            justify-content: flex-end;
        }
        .next-btn {
            display: none;
            height: 44px;
            padding: 0 24px;
            background: var(--accent);
            color: var(--accent-fg);
            border: none;
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .next-btn:hover { opacity: 0.85; }
        .next-btn.visible { display: block; }

        /* ── STUDY SCREEN ──────────────────────────────── */
        #study-screen {
            padding-top: 48px;
            min-height: 100vh;
            display: none;
        }
        #study-screen.active { display: block; }

        /* Compact sticky sub-header for study mode */
        .study-subbar {
            position: sticky;
            top: 48px;
            z-index: 90;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            transition: background 0.3s, border-color 0.3s;
        }

        .study-subbar-left h2 {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 800;
            color: var(--text);
        }
        .study-subbar-left p {
            font-size: 11px;
            color: var(--text3);
            font-family: 'DM Mono', monospace;
        }

        .study-list {
            max-width: 700px;
            margin: 0 auto;
            padding: 16px 16px 40px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .study-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .study-card-header {
            padding: 14px 16px 10px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
        }

        .study-qnum {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .study-qtext {
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            margin-top: 4px;
            line-height: 1.45;
        }

        .study-options {
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .study-opt {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text2);
        }
        .study-opt.correct-opt {
            background: var(--correct-bg);
            color: var(--correct);
            font-weight: 700;
        }
        .study-opt-letter {
            flex-shrink: 0;
            width: 20px;
            height: 20px;
            border-radius: 5px;
            background: var(--surface2);
            color: var(--text3);
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            margin-top: 1px;
        }
        .study-opt.correct-opt .study-opt-letter {
            background: var(--correct);
            color: #fff;
        }

        /* ── RESULTS OVERLAY ───────────────────────────── */
        #results-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        #results-screen.active { display: flex; }

        .results-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px 24px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow-lg);
        }

        .result-emoji { font-size: 48px; margin-bottom: 12px; }

        .result-title {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 900;
            color: var(--text);
            margin-bottom: 20px;
        }

        .score-display {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .score-label {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }
        .score-big {
            font-family: 'Syne', sans-serif;
            font-size: 52px;
            font-weight: 900;
            color: var(--text);
            line-height: 1.1;
            margin-top: 4px;
        }
        .score-denom {
            font-family: 'DM Mono', monospace;
            font-size: 16px;
            color: var(--text3);
        }
        .score-pct {
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            color: var(--text2);
            margin-top: 6px;
        }

        .result-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .result-btn {
            width: 100%;
            height: 46px;
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 800;
            cursor: pointer;
            transition: opacity 0.2s;
            border: none;
        }
        .result-btn:hover { opacity: 0.8; }
        .result-btn.primary {
            background: var(--accent);
            color: var(--accent-fg);
        }
        .result-btn.secondary {
            background: var(--surface2);
            color: var(--text2);
            border: 1px solid var(--border);
        }

        /* ── MISC ──────────────────────────────────────── */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Global Top Bar -->
    <div id="topbar">
        <span id="topbar-title">MAN 315301</span>
        <div id="topbar-right">
            <button class="text-btn hidden" id="home-btn" onclick="goHome()">← Menu</button>
            <button class="icon-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle dark mode">
                <svg id="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg id="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- START SCREEN -->
    <div id="start-screen" class="screen active">
        <div class="start-inner">
            <div class="logo-block">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
                    <rect x="9" y="3" width="6" height="4" rx="1"/>
                    <line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/>
                </svg>
            </div>
            <h1 class="start-title">MANAGEMENT 315301</h1>
            <p class="start-sub">Practice Set · Class Test 2 · Units 3, 4 & 5</p>
            <div class="mode-grid">
                <button class="mode-card primary" onclick="startQuiz()">
                    <div class="mode-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
                        </svg>
                    </div>
                    <span class="mode-label">Start Quiz</span>
                    <span class="mode-desc">Test mode · 75 questions</span>
                </button>
                <button class="mode-card" onclick="showStudyMode()">
                    <div class="mode-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/>
                        </svg>
                    </div>
                    <span class="mode-label">Study Mode</span>
                    <span class="mode-desc">All answers shown</span>
                </button>
            </div>
        </div>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="quiz-screen" class="screen">
        <div class="quiz-inner">
            <div class="quiz-meta">
                <span class="q-counter" id="q-counter">Q 1 / 75</span>
                <span class="score-chip" id="score-chip">Score: 0</span>
            </div>
            <div class="progress-bar-track">
                <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
            </div>
            <div class="question-card">
                <div class="question-num" id="question-num">Question 1</div>
                <div class="question-text" id="question-text"></div>
            </div>
            <div class="options-list" id="options-list"></div>
            <div class="next-row">
                <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next →</button>
            </div>
        </div>
    </div>

    <!-- STUDY SCREEN -->
    <div id="study-screen" class="screen">
        <div class="study-subbar">
            <div class="study-subbar-left">
                <h2>Study Bank</h2>
                <p>75 QUESTIONS &amp; ANSWERS</p>
            </div>
        </div>
        <div class="study-list" id="study-list"></div>
    </div>

    <!-- RESULTS SCREEN -->
    <div id="results-screen" class="screen">
        <div class="results-card">
            <div class="result-emoji" id="result-emoji">🏁</div>
            <div class="result-title">Quiz Complete</div>
            <div class="score-display">
                <div class="score-label">Your Score</div>
                <div class="score-big"><span id="final-score">0</span><span class="score-denom">/75</span></div>
                <div class="score-pct" id="score-pct">0%</div>
            </div>
            <div class="result-actions">
                <button class="result-btn primary" onclick="startQuiz()">Try Again</button>
                <button class="result-btn secondary" onclick="goHome()">Back to Menu</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { q: "_________makes up a quality circle team.", a: "c", options: ["Only upper management", "External consultants", "A group of workers from the same or different department", "A group of customers"] },
            { q: "A quality circle is primarily used for", a: "b", options: ["Production planning", "Continuous improvement", "Product design", "Strategic planning"] },
            { q: "Identify the best suitable Kaizen approach for problem-solving from following", a: "c", options: ["Top-down decision-making", "Reactive, only addressing problems after they occur", "Proactive, focusing on constant, small improvements", "Ignoring employee feedback in decision-making"] },
            { q: "The main goal of Six Sigma methodology is", a: "a", options: ["To eliminate defects and improve quality", "Increase production speed", "To reduce the number of employees", "To lower operational costs without considering quality"] },
            { q: "Identify the tools and techniques from following that support the TQM process.", a: "a", options: ["Statistical Process Control (SPC), Six Sigma, Pareto Analysis, and Root Cause Analysis", "Lean Management, SWOT Analysis , Fishbone Diagram, and 5S", "Benchmarking, BCG Matrix, Process Mapping, and Gantt Charts", "SWOT Analysis, Value Stream Mapping, Balanced Scorecard, and Activity-Based Costing"] },

        let currentQ = 0;
        let score = 0;
        let answered = false;
        let isDark = false;

        function setScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');

            const showHome = id !== 'start-screen';
            document.getElementById('home-btn').classList.toggle('hidden', !showHome);
        }

        function goHome() {
            setScreen('start-screen');
        }

        function startQuiz() {
            currentQ = 0;
            score = 0;
            answered = false;
            setScreen('quiz-screen');
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentQ];
            document.getElementById('q-counter').textContent = `Q ${currentQ + 1} / ${questions.length}`;
            document.getElementById('score-chip').textContent = `Score: ${score}`;
            document.getElementById('question-num').textContent = `Question ${currentQ + 1}`;
            document.getElementById('question-text').textContent = q.q;
            document.getElementById('progress-fill').style.width = `${((currentQ + 1) / questions.length) * 100}%`;
            answered = false;

            const list = document.getElementById('options-list');
            list.innerHTML = '';
            q.options.forEach((opt, i) => {
                const letter = String.fromCharCode(97 + i);
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `
                    <span class="option-letter">${letter}</span>
                    <span class="option-text">${opt}</span>
                `;
                btn.onclick = () => handleAnswer(letter, btn);
                list.appendChild(btn);
            });

            const nextBtn = document.getElementById('next-btn');
            nextBtn.classList.remove('visible');
            nextBtn.textContent = currentQ === questions.length - 1 ? 'Finish →' : 'Next →';
        }

        function handleAnswer(letter, btn) {
            if (answered) return;
            answered = true;

            const q = questions[currentQ];
            const allBtns = document.querySelectorAll('#options-list .option-btn');

            if (letter === q.a) {
                btn.classList.add('correct');
                score++;
            } else {
                btn.classList.add('incorrect');
                allBtns.forEach((b, i) => {
                    if (String.fromCharCode(97 + i) === q.a) b.classList.add('correct');
                });
            }

            allBtns.forEach(b => { b.disabled = true; });
            document.getElementById('next-btn').classList.add('visible');
        }

        function nextQuestion() {
            if (currentQ < questions.length - 1) {
                currentQ++;
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            setScreen('results-screen');
            document.getElementById('final-score').textContent = score;
            const pct = Math.round((score / questions.length) * 100);
            document.getElementById('score-pct').textContent = `${pct}% accuracy`;
            const emoji = document.getElementById('result-emoji');
            emoji.textContent = pct >= 90 ? '🏆' : pct >= 70 ? '🥈' : pct >= 50 ? '📈' : '📚';
        }

        function showStudyMode() {
            setScreen('study-screen');
            renderStudy();
        }

        function renderStudy() {
            const list = document.getElementById('study-list');
            if (list.children.length > 0) return; // already rendered
            questions.forEach((q, i) => {
                const card = document.createElement('div');
                card.className = 'study-card';

                let opts = '';
                q.options.forEach((opt, j) => {
                    const letter = String.fromCharCode(97 + j);
                    const isCorrect = letter === q.a;
                    opts += `
                        <div class="study-opt ${isCorrect ? 'correct-opt' : ''}">
                            <span class="study-opt-letter">${letter}</span>
                            <span>${opt}</span>
                        </div>`;
                });

                card.innerHTML = `
                    <div class="study-card-header">
                        <div class="study-qnum">Q${i + 1}</div>
                        <div class="study-qtext">${q.q}</div>
                    </div>
                    <div class="study-options">${opts}</div>
                `;
                list.appendChild(card);
            });
        }

        function toggleTheme() {
            isDark = !isDark;
            document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
            document.getElementById('theme-icon-sun').style.display = isDark ? 'none' : '';
            document.getElementById('theme-icon-moon').style.display = isDark ? '' : 'none';
        }

        // respect system preference on load
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            toggleTheme();
        }
    </script>
